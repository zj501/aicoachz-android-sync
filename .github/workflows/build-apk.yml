name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: stable
          cache: true

      - name: Scaffold Flutter project
        run: |
          flutter create --project-name sculinebot_sync --org com.aicoachz temp_project
          cp -f pubspec.yaml temp_project/pubspec.yaml
          cp -rf lib/* temp_project/lib/

      - name: Upgrade Kotlin to 2.0.21
        run: |
          python3 - <<'EOF'
          import re, os

          # settings.gradle (Flutter 3.19+ plugin-style)
          sg = "temp_project/android/settings.gradle"
          if os.path.exists(sg):
              c = open(sg).read()
              c = re.sub(
                  r'id\s+"org\.jetbrains\.kotlin\.android"\s+version\s+"[^"]+"',
                  'id "org.jetbrains.kotlin.android" version "2.0.21"',
                  c
              )
              open(sg, "w").write(c)
              print("settings.gradle updated")

          # build.gradle (older style)
          bg = "temp_project/android/build.gradle"
          if os.path.exists(bg):
              c = open(bg).read()
              c = re.sub(r"ext\.kotlin_version\s*=\s*'[^']+'", "ext.kotlin_version = '2.0.21'", c)
              c = re.sub(r'ext\.kotlin_version\s*=\s*"[^"]+"', 'ext.kotlin_version = "2.0.21"', c)
              open(bg, "w").write(c)
              print("build.gradle updated")
          EOF

      - name: Inject Health Connect permissions into manifest
        run: |
          python3 - <<'EOF'
          import re

          path = "temp_project/android/app/src/main/AndroidManifest.xml"
          content = open(path).read()

          permissions = """
              <uses-permission android:name="android.permission.health.READ_STEPS"/>
              <uses-permission android:name="android.permission.health.READ_HEART_RATE"/>
              <uses-permission android:name="android.permission.health.READ_ACTIVE_CALORIES_BURNED"/>
              <uses-permission android:name="android.permission.health.READ_SLEEP"/>
              <uses-permission android:name="android.permission.health.READ_WEIGHT"/>
              <uses-permission android:name="android.permission.health.READ_HEART_RATE_VARIABILITY"/>
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
          """

          queries = """
              <queries>
                  <package android:name="com.google.android.apps.healthdata"/>
              </queries>
          """

          content = re.sub(r'(<manifest[^>]*>)', r'\1' + permissions, content, count=1)
          content = content.replace('</manifest>', queries + '</manifest>')
          open(path, 'w').write(content)
          print("Manifest updated.")
          EOF

      - name: Install NDK 27
        run: echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973"

      - name: Patch build.gradle.kts (NDK + desugaring)
        run: |
          python3 - <<'EOF'
          import re, os

          for path in ["temp_project/android/app/build.gradle.kts",
                       "temp_project/android/app/build.gradle"]:
              if not os.path.exists(path):
                  continue
              c = open(path).read()
              is_kts = path.endswith(".kts")

              # Replace flutter.ndkVersion with pinned version
              if is_kts:
                  c = re.sub(r'ndkVersion\s*=\s*flutter\.ndkVersion',
                             'ndkVersion = "27.0.12077973"', c)
                  if 'ndkVersion' not in c:
                      c = re.sub(r'(android\s*\{)',
                                 r'\1\n    ndkVersion = "27.0.12077973"', c, 1)
              else:
                  c = re.sub(r'ndkVersion\s+flutter\.ndkVersion',
                             'ndkVersion "27.0.12077973"', c)
                  if 'ndkVersion' not in c:
                      c = re.sub(r'(android\s*\{)',
                                 r'\1\n    ndkVersion "27.0.12077973"', c, 1)

              # Enable core library desugaring
              if is_kts:
                  if 'isCoreLibraryDesugaringEnabled' not in c:
                      c = re.sub(r'(compileOptions\s*\{)',
                                 r'\1\n        isCoreLibraryDesugaringEnabled = true', c)
                      if 'compileOptions' not in c:
                          c = re.sub(r'(android\s*\{)',
                                     r'\1\n    compileOptions {\n        isCoreLibraryDesugaringEnabled = true\n    }', c, 1)
                  if 'coreLibraryDesugaring' not in c:
                      c = re.sub(r'(dependencies\s*\{)',
                                 r'\1\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")', c)
                      if 'dependencies' not in c:
                          c += '\ndependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")\n}\n'
              else:
                  if 'coreLibraryDesugaringEnabled' not in c:
                      c = re.sub(r'(compileOptions\s*\{)',
                                 r'\1\n        coreLibraryDesugaringEnabled true', c)
                  if 'coreLibraryDesugaring' not in c:
                      c = re.sub(r'(dependencies\s*\{)',
                                 r'\1\n    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"', c)

              open(path, "w").write(c)
              print(f"Patched {path}")
          EOF

      - name: Install dependencies
        run: cd temp_project && flutter pub get

      - name: Build release APK
        run: cd temp_project && flutter build apk --release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: SCULINEBOT Sync App (build ${{ github.run_number }})
          body: |
            自動編譯版本 #${{ github.run_number }}

            **安裝步驟：**
            1. 下載 `app-release.apk`
            2. 手機允許「從未知來源安裝」
            3. 安裝後輸入你的 LINE User ID 及後端網址即可使用
          files: temp_project/build/app/outputs/flutter-apk/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}
