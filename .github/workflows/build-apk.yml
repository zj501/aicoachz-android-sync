name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Scaffold Flutter project
        run: |
          flutter create --project-name sculinebot_sync --org com.aicoachz temp_project
          cp -f pubspec.yaml temp_project/pubspec.yaml
          cp -rf lib/* temp_project/lib/

      - name: Inject Health Connect permissions into manifest
        run: |
          python3 - <<'EOF'
          import re

          path = "temp_project/android/app/src/main/AndroidManifest.xml"
          content = open(path).read()

          permissions = """
              <uses-permission android:name="android.permission.health.READ_STEPS"/>
              <uses-permission android:name="android.permission.health.READ_HEART_RATE"/>
              <uses-permission android:name="android.permission.health.READ_ACTIVE_CALORIES_BURNED"/>
              <uses-permission android:name="android.permission.health.READ_SLEEP"/>
              <uses-permission android:name="android.permission.health.READ_WEIGHT"/>
              <uses-permission android:name="android.permission.health.READ_HEART_RATE_VARIABILITY"/>
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
          """

          queries = """
              <queries>
                  <package android:name="com.google.android.apps.healthdata"/>
              </queries>
          """

          # Insert permissions after <manifest ...>
          content = re.sub(r'(<manifest[^>]*>)', r'\1' + permissions, content, count=1)
          # Insert queries before </manifest>
          content = content.replace('</manifest>', queries + '</manifest>')

          open(path, 'w').write(content)
          print("Manifest updated.")
          EOF

      - name: Install dependencies
        run: cd temp_project && flutter pub get

      - name: Build release APK
        run: cd temp_project && flutter build apk --release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: SCULINEBOT Sync App (build ${{ github.run_number }})
          body: |
            自動編譯版本 #${{ github.run_number }}

            **安裝步驟：**
            1. 下載 `app-release.apk`
            2. 手機允許「從未知來源安裝」
            3. 安裝後輸入你的 LINE User ID 及後端網址即可使用
          files: temp_project/build/app/outputs/flutter-apk/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}
