name: sculinebot_health_sync
description: SCULINEBOT Android Health Connect Sync App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  health: ^12.0.0               # HealthKit + Health Connect unified API
  workmanager: ^0.6.0           # Android WorkManager background tasks
  http: ^1.2.0                  # HTTP client for backend POST
  shared_preferences: ^2.3.0    # Store user LINE ID
  permission_handler: ^11.3.0   # Runtime permission requests
  flutter_local_notifications: ^17.2.0  # Sync status notifications

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
